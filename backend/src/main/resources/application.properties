# ==========================================
# Configurações do Banco de Dados (Supabase)
# ==========================================
# Defina a variável de ambiente antes de rodar:
#   export SUPABASE_DB_PASSWORD=sua_senha_do_supabase
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.thxlflekyabjmqvhfwsq
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Configurações do JPA / Hibernate
# ==========================================
# validate: Hibernate verifica se o schema bate com as entidades (não altera o banco)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

